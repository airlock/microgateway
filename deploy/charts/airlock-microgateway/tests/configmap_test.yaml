suite: helm.TestConfigMap
templates:
  - configmap.yaml
tests:
  - it: should set name and namespace
    release:
      name: myoperator
      namespace: mytestnamespace
    asserts:
      - equal:
          path: metadata.name
          value: myoperator-microgateway-config
      - equal:
          path: metadata.namespace
          value: mytestnamespace

  - it: should override fullname if provided
    set:
      nameOverride: myoperatorname
      fullnameOverride: operatorfullname
    release:
      name: operator-test-release
    asserts:
      - equal:
          path: metadata.name
          value: operatorfullname-config

  - it: should contain data key for engine bootstrap config template
    asserts:
      - exists:
          path: data["engine_bootstrap_config_template.yaml"]
