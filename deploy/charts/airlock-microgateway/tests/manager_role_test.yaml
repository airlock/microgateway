suite: helm.TestManagerRole
templates:
  - manager-role.yaml
tests:
  - it: should create role for operator
    release:
      name: myoperator
      namespace: mytestnamespace
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: myoperator-microgateway-manager-mytestnamespace
      - contains:
          path: rules
          content:
            apiGroups:
              - microgateway.airlock.com
          any: true

  - it: should override fullname if provided
    set:
      nameOverride: myoperatorname
      fullnameOverride: operatorfullname
    release:
      name: myoperator
      namespace: mytestnamespace
    asserts:
      - equal:
          path: metadata.name
          value: operatorfullname-manager-mytestnamespace

  - it: should not create role if creation is disabled
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set rules
    asserts:
      - isNotNullOrEmpty:
          path: rules