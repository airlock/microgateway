suite: helm.TestNotes
templates:
  - NOTES.txt
tests:
  - it: devel chart should describe latest doc links
    chart:
      appVersion: dev
    asserts: &latestDoc
      - matchRegexRaw:
          pattern: ".*Documentation: https://docs.airlock.com/microgateway/latest.*"
      - matchRegexRaw:
          pattern: ".*CRD API reference documentation: https://docs.airlock.com/microgateway/latest/index/api/crds.*"
  - it: prerelease chart should describe latest doc links
    chart:
      appVersion: 4.2.0-ci
    asserts: *latestDoc
  - it: released chart should describe specific doc links
    chart:
      appVersion: 4.2.4
    asserts:
      - matchRegexRaw:
          pattern: ".*Documentation: https://docs.airlock.com/microgateway/4.2.*"
      - matchRegexRaw:
          pattern: ".*CRD API reference documentation: https://docs.airlock.com/microgateway/4.2/index/api/crds.*"
  - it: should succeed if tests are enabled
    release:
      name: myoperator
      namespace: mytestnamespace
    set:
      tests.enabled: true
    asserts:
      - notFailedTemplate: {}

  - it: gateway API check should succeed without warning if no cluster available
    asserts:
      - notFailedTemplate: {}
      - notMatchRegexRaw:
          pattern: "Warning: Gateway API check skipped"
  - it: gateway API check should be skipped with warning if cluster available
    set:
      crds.skipGatewayAPICheck: true
    kubernetesProvider:
      scheme:
        "v1/Namespace":
          gvr:
            version: "v1"
            resource: "namespaces"
          namespaced: false
      objects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: default
    asserts:
      - notFailedTemplate: { }
      - matchRegexRaw:
          pattern: "Warning: Gateway API check skipped"
  - it: gateway API check should fail if cluster available without gateway CRD
    kubernetesProvider:
      scheme:
        "v1/Namespace":
          gvr:
            version: "v1"
            resource: "namespaces"
          namespaced: false
      objects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: default
    asserts:
      - failedTemplate:
          errorPattern: "Airlock Microgateway requires Gateway API v1 CRDs to be installed in the cluster"
  - it: gateway API check should fail if cluster available without gateway v1 CRD
    kubernetesProvider:
      scheme:
        "v1/Namespace":
          gvr:
            version: "v1"
            resource: "namespaces"
          namespaced: false
        "apiextensions.k8s.io/v1/CustomResourceDefinition":
          gvr:
            group: apiextensions.k8s.io
            version: "v1"
            resource: "customresourcedefinitions"
          namespaced: false
      objects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: default
        - apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: gateways.gateway.networking.k8s.io
          spec:
            versions:
              - name: v1alpha1
    asserts:
      - failedTemplate:
          errorPattern: "Airlock Microgateway requires Gateway API v1 CRDs to be installed in the cluster"
  - it: gateway API check should succeed if cluster available with gateway v1 CRD
    kubernetesProvider:
      scheme:
        "v1/Namespace":
          gvr:
            version: "v1"
            resource: "namespaces"
          namespaced: false
        "apiextensions.k8s.io/v1/CustomResourceDefinition":
          gvr:
            group: apiextensions.k8s.io
            version: "v1"
            resource: "customresourcedefinitions"
          namespaced: false
      objects:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: default
        - apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: gateways.gateway.networking.k8s.io
          spec:
            versions:
              - name: v1alpha1
              - name: v1
              - name: v1alpha3
    asserts:
      - notFailedTemplate: {}
