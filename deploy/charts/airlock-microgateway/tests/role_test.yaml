suite: helm.TestRole
templates:
  - role.yaml
tests:
  - it: should set name and namespace
    release:
      name: myoperator
      namespace: mytestnamespace
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Role
      - equal:
          path: metadata.name
          value: myoperator-microgateway-leader-election
      - equal:
          path: metadata.namespace
          value: mytestnamespace

  - it: should override fullname if provided
    set:
      nameOverride: myoperatorname
      fullnameOverride: operatorfullname
    release:
      name: myoperator
      namespace: mytestnamespace
    asserts:
      - equal:
          path: metadata.name
          value: operatorfullname-leader-election

  - it: should not create role if creation is disabled
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set rules
    asserts:
      - isNotNullOrEmpty:
          path: rules