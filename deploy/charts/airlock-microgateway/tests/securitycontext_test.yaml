suite: helm.TestSecurityContexts
tests:
  - it: should set restricted security context in all deployments and statefulsets
    set:
      tests:
        enabled: true
    templates:
      - deployment.yaml
    asserts:
      - isSubset:
          path: spec.template.spec.containers.*.securityContext
          content:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            capabilities:
              drop: [ "ALL" ]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
  - it: should set restricted security context in all pods
    templates:
      - tests/test-install.yaml
    set:
      tests:
        enabled: true
    asserts:
      - isSubset:
          path: spec.containers.*.securityContext
          content:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            capabilities:
              drop: [ "ALL" ]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
