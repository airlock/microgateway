suite: helm.TestValidatingAdmissionPolicyBinding
templates:
  - validating-admission-policy-binding.yaml
tests:
  - it: should not render admission policy binding
    capabilities:
      majorVersion: 1
      minorVersion: 29
    asserts:
      - hasDocuments:
          count: 0

  - it: should render admission policy binding, set name and policyName
    release:
      name: myoperator
      namespace: mytestnamespace
    capabilities:
      majorVersion: 1
      minorVersion: 30
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ValidatingAdmissionPolicyBinding
      - equal:
          path: metadata.name
          value: myoperator-microgateway-immutable-labels-mytestnamespace
        documentIndex: 0
      - equal:
          path: spec.policyName
          value: myoperator-microgateway-immutable-labels-mytestnamespace
        documentIndex: 0
      - equal:
          path: metadata.name
          value: myoperator-microgateway-envoycluster-name-mytestnamespace
        documentIndex: 1
      - equal:
          path: spec.policyName
          value: myoperator-microgateway-envoycluster-name-mytestnamespace
        documentIndex: 1
      - equal:
          path: spec.validationActions
          value:  [Deny]
        documentIndex: 0
      - equal:
          path: spec.validationActions
          value:  [Deny]
        documentIndex: 1